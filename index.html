<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Math2Diamond Store</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #121212;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* Top Header */
        .header {
            width: 100%;
            background: linear-gradient(90deg, #ff5e00, #ffbb00);
            padding: 20px 10px;
            text-align: center;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
        }

        .header h1 {
            font-size: 24px;
            font-weight: bold;
            color: #ffffff;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Navigation Buttons */
        .nav-buttons {
            display: flex;
            justify-content: center;
            gap: 15px;
            width: 100%;
            max-width: 400px;
            margin: 20px auto;
            padding: 0 10px;
        }

        .btn-nav {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            text-align: center;
            text-decoration: none;
            transition: 0.2s;
        }

        .btn-home {
            background-color: #e53935;
            color: white;
        }

        .btn-free {
            background-color: #00e676;
            color: #000;
        }

        .btn-nav:hover {
            opacity: 0.9;
            transform: scale(1.02);
        }

        /* Store Container */
        .store-container {
            width: 100%;
            max-width: 400px;
            padding: 10px 15px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* Card Style */
        .package-card {
            background-color: #1a1a1a;
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
        }

        /* Card 1 Specific Border */
        .card-paid {
            border: 1px solid #ffaa00;
        }

        /* Card 2 Specific Border */
        .card-free {
            border: 1px solid #333333;
        }

        .game-logo {
            width: 120px;
            height: auto;
            margin-bottom: 5px;
        }

        .package-title {
            font-size: 20px;
            font-weight: bold;
            color: #ffbb00;
        }

        .card-free .package-title {
            color: #ffffff;
        }

        .package-desc {
            font-size: 14px;
            color: #cccccc;
            line-height: 1.5;
            max-width: 300px;
        }

        .package-price {
            font-size: 18px;
            font-weight: bold;
            color: #ffffff;
            margin: 5px 0;
        }

        /* Action Buttons */
        .btn-action {
            width: 100%;
            max-width: 200px;
            padding: 12px;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }

        .btn-buy {
            background-color: #e53935;
            color: white;
        }

        .btn-redeem {
            background-color: #00e676;
            color: #000;
        }

        .btn-action:hover {
            opacity: 0.9;
            transform: scale(1.03);
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>Smart Math2Diamond</h1>
    </div>

    <div class="nav-buttons">
        <a href="#" class="btn-nav btn-home">Home (Store)</a>
        <a href="#" class="btn-nav btn-free">Get Diamonds Free 💎</a>
    </div>

    <div class="store-container">

        <div class="package-card card-paid">
            <img src="https://upload.wikimedia.org/wikipedia/en/c/cc/Free_Fire_logo.png" alt="Free Fire" class="game-logo">
            
            <h2 class="package-title">Free Fire Diamonds</h2>
            <p class="package-desc">Pay and get diamonds directly sent to your Player ID instantly.</p>
            
            <div class="package-price">From $1.00</div>
            
            <button class="btn-action btn-buy">Buy Now</button>
        </div>

        <div class="package-card card-free">
            <img src="https://upload.wikimedia.org/wikipedia/en/c/cc/Free_Fire_logo.png" alt="Free Fire Free" class="game-logo">
            
            <h2 class="package-title">Diamonds (Earned Coins)</h2>
            <p class="package-desc">Redeem free diamonds using the coins you have collected in the game.</p>
            
            <div class="package-price">From 5000 Coins</div>
            
            <button class="btn-action btn-redeem">Redeem Now</button>
        </div>

    </div>

</body>
</html>
